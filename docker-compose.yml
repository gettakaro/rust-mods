services:
  rust:
    build: .
    container_name: rust-carbon
    ports:
      - "28015:28015/udp"
      - "127.0.0.1:28016:28016"
    environment:
      RUST_SERVER_NAME: "Takaro Dev"
      RUST_SERVER_SEED: "12345"
      RUST_SERVER_WORLDSIZE: "1000"
      RUST_SERVER_MAXPLAYERS: "10"
      RCON_PASSWORD: "${RCON_PASSWORD:-takaro123}"  # dev only — change for production
      # Takaro connector config (read by plugin via env vars)
      TAKARO_WS_URL: "${TAKARO_WS_URL}"
      TAKARO_REGISTRATION_TOKEN: "${TAKARO_REGISTRATION_TOKEN}"
      TAKARO_IDENTITY_TOKEN: "${TAKARO_IDENTITY_TOKEN:-takaro-rust-dev}"
      TAKARO_DEBUG: "${TAKARO_DEBUG:-false}"
      RUST_SERVER_PORT: "${RUST_SERVER_PORT:-28015}"
      RUST_RCON_PORT: "${RUST_RCON_PORT:-28016}"
      RUST_SERVER_IDENTITY: "${RUST_SERVER_IDENTITY:-takaro}"
    volumes:
      - ./_data/plugins:/rust/carbon/plugins
      - ./_data/server:/rust/server
      - ./_data/carbon-logs:/rust/carbon/logs
    restart: unless-stopped

  takaro-mcp:
    image: ghcr.io/gettakaro/mcp:latest
    container_name: takaro-mcp-rust
    ports:
      - "3005:3000"
    environment:
      TAKARO_USERNAME: "${TAKARO_USERNAME}"
      TAKARO_PASSWORD: "${TAKARO_PASSWORD}"
      TAKARO_DOMAIN_ID: "${TAKARO_DOMAIN_ID}"
      TAKARO_HOST: "${TAKARO_HOST:-https://api.next.takaro.dev}"
      HOST: "0.0.0.0"
    restart: unless-stopped
