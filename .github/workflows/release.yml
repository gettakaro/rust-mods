name: Release

on:
  push:
    branches: [main]

jobs:
  release:
    # Skip commits made by this workflow (version bumps)
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Compute next version
        id: version
        run: |
          LATEST=$(git tag -l 'v*' --sort=-v:refname | head -n1)
          if [ -z "$LATEST" ]; then
            NEXT="1.0.0"
          else
            # Strip v prefix, increment patch
            BASE="${LATEST#v}"
            IFS='.' read -r MAJOR MINOR PATCH <<< "$BASE"
            NEXT="$MAJOR.$MINOR.$((PATCH + 1))"
          fi
          echo "version=$NEXT" >> "$GITHUB_OUTPUT"
          echo "Next version: $NEXT"
      - name: Update plugin version
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          OLD='\[Info("TakaroConnector", "Takaro", "[^"]*")\]'
          NEW="[Info(\"TakaroConnector\", \"Takaro\", \"$VERSION\")]"
          sed -i "s/$OLD/$NEW/" plugin/TakaroConnector.cs
      - name: Commit, tag, and release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email \
            "github-actions[bot]@users.noreply.github.com"
          git add plugin/TakaroConnector.cs
          if git diff --cached --quiet; then
            echo "Version already up to date, tagging current commit"
            git tag "v$VERSION"
            git push origin "v$VERSION"
          else
            git commit -m "release: v$VERSION"
            git tag "v$VERSION"
            git push origin HEAD "v$VERSION"
          fi
          gh release create "v$VERSION" \
            plugin/TakaroConnector.cs \
            --title "TakaroConnector v$VERSION" \
            --generate-notes
