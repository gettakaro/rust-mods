name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Shellcheck
        run: shellcheck -e SC1091 scripts/*.sh start.sh

  compile-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache Rust game DLLs
        uses: actions/cache@v4
        id: dll-cache
        with:
          path: /tmp/managed-dlls/game
          key: rust-dedicated-managed-v1

      - name: Download Rust server DLLs
        if: steps.dll-cache.outputs.cache-hit != 'true'
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update
          sudo apt-get install -y lib32gcc-s1

          mkdir -p /tmp/steamcmd
          curl -sL https://steamcdn-a.akamaihd.net/client/installer/steamcmd_linux.tar.gz \
            | tar -xzf - -C /tmp/steamcmd

          /tmp/steamcmd/steamcmd.sh \
            +force_install_dir /tmp/rust \
            +login anonymous \
            +app_update 258550 validate \
            +quit

          mkdir -p /tmp/managed-dlls/game
          cp /tmp/rust/RustDedicated_Data/Managed/*.dll /tmp/managed-dlls/game/

      - name: Download Carbon
        run: |
          curl -sL https://github.com/CarbonCommunity/Carbon/releases/download/production_build/Carbon.Linux.Release.tar.gz \
            -o /tmp/carbon.tar.gz
          mkdir -p /tmp/carbon
          tar -xzf /tmp/carbon.tar.gz -C /tmp/carbon

      - name: Compile plugin
        run: |
          GAME=/tmp/managed-dlls/game
          CARBON=/tmp/carbon/carbon/managed

          # Set up a temporary dotnet project for compilation.
          # Uses Roslyn (dotnet build) instead of Mono's mcs because:
          # - Game DLLs target netstandard2.1
          # - Carbon publicizes internal game members at runtime,
          #   so we use IgnoresAccessChecksTo to match that behavior
          mkdir -p /tmp/compile-check/src

          cp plugin/TakaroConnector.cs /tmp/compile-check/src/

          # Define IgnoresAccessChecksTo attribute (standard .NET pattern
          # for bypassing internal access — matches Carbon's runtime behavior)
          cat > /tmp/compile-check/src/IgnoreAccessChecks.cs << 'CSEOF'
          using System;
          using System.Runtime.CompilerServices;
          [assembly: IgnoresAccessChecksTo("Assembly-CSharp")]
          namespace System.Runtime.CompilerServices
          {
              [AttributeUsage(AttributeTargets.Assembly, AllowMultiple = true)]
              internal class IgnoresAccessChecksToAttribute : Attribute
              {
                  public IgnoresAccessChecksToAttribute(string assemblyName) { }
              }
          }
          CSEOF

          # Build reference XML for .csproj
          REFS=""
          for dll in "$GAME"/*.dll "$CARBON"/*.dll; do
            name=$(basename "$dll" .dll)
            REFS="$REFS<Reference Include=\"$name\"><HintPath>$dll</HintPath></Reference>"
          done

          cat > /tmp/compile-check/compile-check.csproj << PROJ
          <Project Sdk="Microsoft.NET.Sdk">
            <PropertyGroup>
              <TargetFramework>netstandard2.1</TargetFramework>
              <EnableDefaultCompileItems>true</EnableDefaultCompileItems>
              <GenerateAssemblyInfo>false</GenerateAssemblyInfo>
              <GenerateTargetFrameworkAttribute>false</GenerateTargetFrameworkAttribute>
              <DisableImplicitFrameworkReferences>true</DisableImplicitFrameworkReferences>
              <NoWarn>CS1685</NoWarn>
            </PropertyGroup>
            <ItemGroup>
              $REFS
            </ItemGroup>
          </Project>
          PROJ

          dotnet build /tmp/compile-check/compile-check.csproj

  docker-build:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t takaro-rust-test .
