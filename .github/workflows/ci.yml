name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Shellcheck
        run: shellcheck -e SC1091 scripts/*.sh start.sh

  compile-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache Rust game DLLs
        uses: actions/cache@v4
        id: dll-cache
        with:
          path: /tmp/managed-dlls/game
          key: rust-dedicated-managed-v1

      - name: Download Rust server DLLs
        if: steps.dll-cache.outputs.cache-hit != 'true'
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update
          sudo apt-get install -y lib32gcc-s1

          mkdir -p /tmp/steamcmd
          curl -sL https://steamcdn-a.akamaihd.net/client/installer/steamcmd_linux.tar.gz \
            | tar -xzf - -C /tmp/steamcmd

          /tmp/steamcmd/steamcmd.sh \
            +force_install_dir /tmp/rust \
            +login anonymous \
            +app_update 258550 validate \
            +quit

          mkdir -p /tmp/managed-dlls/game
          cp /tmp/rust/RustDedicated_Data/Managed/*.dll /tmp/managed-dlls/game/

      - name: Download Carbon
        run: |
          curl -sL https://github.com/CarbonCommunity/Carbon/releases/download/production_build/Carbon.Linux.Release.tar.gz \
            -o /tmp/carbon.tar.gz
          mkdir -p /tmp/carbon
          tar -xzf /tmp/carbon.tar.gz -C /tmp/carbon

      - name: Compile plugin
        run: |
          GAME=/tmp/managed-dlls/game
          CARBON=/tmp/carbon/carbon/managed

          # Set up a temporary dotnet project for compilation.
          # Uses Roslyn via dotnet build because game DLLs target netstandard2.1.
          # Carbon publicizes all game DLL members at runtime using Mono.Cecil,
          # so we use BepInEx.AssemblyPublicizer to match that behavior.
          mkdir -p /tmp/compile-check/src

          cp plugin/TakaroConnector.cs /tmp/compile-check/src/

          # Build reference XML for .csproj (skip system DLLs — SDK provides those)
          GAME_REFS=""
          for dll in "$GAME"/*.dll; do
            name=$(basename "$dll" .dll)
            case "$name" in
              System.*|mscorlib|netstandard|Microsoft.*) continue ;;
            esac
            GAME_REFS="$GAME_REFS<Reference Include=\"$name\" HintPath=\"$dll\" Publicize=\"true\" />"
          done
          CARBON_REFS=""
          for dll in "$CARBON"/*.dll; do
            name=$(basename "$dll" .dll)
            CARBON_REFS="$CARBON_REFS<Reference Include=\"$name\" HintPath=\"$dll\" />"
          done

          cat > /tmp/compile-check/compile-check.csproj << PROJ
          <Project Sdk="Microsoft.NET.Sdk">
            <PropertyGroup>
              <TargetFramework>netstandard2.1</TargetFramework>
              <EnableDefaultCompileItems>true</EnableDefaultCompileItems>
              <GenerateAssemblyInfo>false</GenerateAssemblyInfo>
              <GenerateTargetFrameworkAttribute>false</GenerateTargetFrameworkAttribute>
              <NoWarn>CS1685</NoWarn>
            </PropertyGroup>
            <ItemGroup>
              <PackageReference Include="BepInEx.AssemblyPublicizer.MSBuild" Version="0.4.2" PrivateAssets="all" />
              $GAME_REFS
              $CARBON_REFS
            </ItemGroup>
          </Project>
          PROJ

          dotnet build /tmp/compile-check/compile-check.csproj

  docker-build:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t takaro-rust-test .
