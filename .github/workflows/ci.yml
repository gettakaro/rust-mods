name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Shellcheck
        run: shellcheck -e SC1091 scripts/*.sh start.sh

  compile-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache Rust game DLLs
        uses: actions/cache@v4
        id: dll-cache
        with:
          path: /tmp/managed-dlls/game
          key: rust-dedicated-managed-v1

      - name: Download Rust server DLLs
        if: steps.dll-cache.outputs.cache-hit != 'true'
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update
          sudo apt-get install -y lib32gcc-s1

          mkdir -p /tmp/steamcmd
          curl -sL https://steamcdn-a.akamaihd.net/client/installer/steamcmd_linux.tar.gz \
            | tar -xzf - -C /tmp/steamcmd

          /tmp/steamcmd/steamcmd.sh \
            +force_install_dir /tmp/rust \
            +login anonymous \
            +app_update 258550 validate \
            +quit

          mkdir -p /tmp/managed-dlls/game
          cp /tmp/rust/RustDedicated_Data/Managed/*.dll /tmp/managed-dlls/game/

      - name: Download Carbon
        run: |
          curl -sL https://github.com/CarbonCommunity/Carbon/releases/download/production_build/Carbon.Linux.Release.tar.gz \
            -o /tmp/carbon.tar.gz
          mkdir -p /tmp/carbon
          tar -xzf /tmp/carbon.tar.gz -C /tmp/carbon

      - name: Compile plugin
        run: |
          sudo apt-get install -y mono-mcs

          GAME=/tmp/managed-dlls/game
          CARBON=/tmp/carbon/carbon/managed

          # Reference game-specific DLLs (skip System.*/mscorlib/netstandard
          # which conflict with Mono's own standard library)
          REFS=""
          for dll in "$GAME"/*.dll; do
            name=$(basename "$dll")
            case "$name" in
              System.*|mscorlib.*|netstandard.*|Microsoft.*) continue ;;
            esac
            REFS="$REFS -r:$dll"
          done
          for dll in "$CARBON"/*.dll; do
            REFS="$REFS -r:$dll"
          done

          # shellcheck disable=SC2086
          mcs -target:library \
            $REFS \
            -out:/dev/null \
            plugin/TakaroConnector.cs

  docker-build:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t takaro-rust-test .
